{{ $featherURL := absURL "/svg/feather-sprite.svg" }}

{{ $file := .Get 0 }}
<a href="{{ $file }}">{{ $file }}</a>
<div class="key-block">
  {{ highlight (strings.Trim (readFile (print "static/keys/" $file)) "\n") }}
  <a class="key-copy-btn">
    <svg class="feather">
      <use href="{{ printf "%s#%s" $featherURL "clipboard" }}" />
    </svg>
  </a>
  <a href="{{ $file }}">
    <svg class="feather">
      <use href="{{ printf "%s#%s" $featherURL "download" }}" />
    </svg>
  </a>
</div>
